<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夢裡夢外 — Among All Dreams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:      #F7F4EF;
  --text:    #2C2A27;
  --muted:   #7A7670;
  --border:  #DDD9D0;
  --page-l:  #FDFAF5;
  --page-r:  #FAF7F0;
  --serif:   'Noto Serif TC', 'Songti SC', serif;
  --shadow:  0 16px 56px rgba(0,0,0,0.24), 0 2px 8px rgba(0,0,0,0.12);

  --c-departure: #C4B49A;
  --c-loss:      #8B9EA8;
  --c-violence:  #A8896C;
  --c-heartdead: #6B7280;
  --c-rebuild:   #7A9E87;
  --c-action:    #9B7B9E;
  --c-fly:       #B8A9C9;
  --c-float:     #A9C4C0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
}

/* ── VIEWS ──────────────────────────────────────────── */
.view {
  display: none;
  position: fixed;
  inset: 0;
  overflow: hidden;
}
.view.active { display: flex; flex-direction: column; }

/* ── PHASE COLOURS ──────────────────────────────────── */
.ph-departure  { background: var(--c-departure); }
.ph-loss       { background: var(--c-loss); }
.ph-violence   { background: var(--c-violence); }
.ph-heartdead  { background: var(--c-heartdead); }
.ph-rebuild    { background: var(--c-rebuild); }
.ph-action     { background: var(--c-action); }
.ph-fly        { background: var(--c-fly); }
.ph-float      { background: var(--c-float); }

/* ══════════════════════════════════════════════════════
   VIEW 1 — COVER
   ══════════════════════════════════════════════════════ */
#view-cover {
  align-items: center;
  justify-content: center;
  background: var(--bg);
  cursor: pointer;
}
.cover-inner {
  text-align: center;
  user-select: none;
  padding: 32px;
}
.cover-rule-top {
  width: 1px;
  height: 48px;
  background: var(--border);
  margin: 0 auto 28px;
}
.cover-zh {
  font-size: clamp(2.6rem, 9vw, 4.4rem);
  font-weight: 600;
  letter-spacing: 0.22em;
  line-height: 1.1;
}
.cover-en {
  margin-top: 14px;
  font-size: clamp(0.68rem, 2vw, 0.82rem);
  letter-spacing: 0.26em;
  color: var(--muted);
  text-transform: uppercase;
}
.cover-mid {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px auto;
  width: fit-content;
}
.cover-line { flex: 1; width: 36px; height: 1px; background: var(--border); }
.cover-dot  { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }
.cover-author {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}
.cover-hint {
  margin-top: 44px;
  font-size: 0.66rem;
  color: var(--border);
  letter-spacing: 0.16em;
}

/* ══════════════════════════════════════════════════════
   VIEW 2 — TABLE OF CONTENTS
   ══════════════════════════════════════════════════════ */
#view-toc { background: var(--bg); }

.toc-header {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.toc-back {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--serif);
  font-size: 0.72rem;
  color: var(--muted);
  padding: 4px 10px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.toc-back:hover { color: var(--text); border-color: var(--muted); }
.toc-heading {
  flex: 1;
  text-align: center;
  font-size: 0.88rem;
  letter-spacing: 0.14em;
  font-weight: 600;
}
.toc-spacer { width: 58px; flex-shrink: 0; }

.toc-grid {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 48px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px;
  align-content: start;
}

.toc-card {
  background: var(--page-l);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
}
.toc-card:hover {
  box-shadow: 0 4px 18px rgba(0,0,0,0.11);
  transform: translateY(-2px);
}
.toc-stripe { height: 4px; }
.toc-body   { padding: 10px 12px 12px; }
.toc-num    { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 5px; }
.toc-title  { font-size: 0.8rem; line-height: 1.45; margin-bottom: 8px; min-height: 2.3em; }
.toc-chip   {
  display: inline-block; font-size: 0.58rem;
  padding: 2px 7px; border-radius: 20px;
  color: #fff; letter-spacing: 0.04em; opacity: 0.9;
}

/* ══════════════════════════════════════════════════════
   VIEW 3 — BOOK SPREAD
   ══════════════════════════════════════════════════════ */
#view-book { background: var(--bg); }

/* ── Header ──────────────────────────────────────── */
.book-hdr {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 48px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
}
.bh-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--serif);
  font-size: 0.7rem;
  color: var(--muted);
  padding: 3px 9px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.bh-btn:hover { color: var(--text); border-color: var(--muted); }
.bh-btn:disabled { opacity: 0.28; cursor: default; }
.bh-info {
  flex: 1;
  text-align: center;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bh-phase {
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 20px;
  color: #fff;
  letter-spacing: 0.04em;
  opacity: 0.9;
  flex-shrink: 0;
}

/* ── Stage (centres the book) ─────────────────────── */
.book-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 16px 8px;
  min-height: 0;
}

/* ── Book spread container ────────────────────────── */
.book-spread {
  position: relative;
  display: flex;
  flex-direction: row;
  width: 100%;
  max-width: 860px;
  height: min(72vh, 600px);
  box-shadow: var(--shadow);
  border-radius: 2px 5px 5px 2px;
}

/* ── Pages ────────────────────────────────────────── */
.book-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.page-left  { background: var(--page-l); border-radius: 2px 0 0 2px; }
.page-right { background: var(--page-r); border-radius: 0 5px 5px 0; position: relative; }

.book-spine {
  flex: 0 0 6px;
  background: linear-gradient(to right, #AEA9A0 0%, #E2DDD6 45%, #E2DDD6 55%, #AEA9A0 100%);
  position: relative;
  z-index: 2;
}

/* ── Left page inner ──────────────────────────────── */
.pl-inner {
  height: 100%;
  padding: 26px 22px 18px;
  display: flex;
  flex-direction: column;
}
.pl-num   { font-size: 0.58rem; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 5px; }
.pl-title { font-size: clamp(0.8rem, 1.7vw, 0.98rem); font-weight: 600; line-height: 1.35; margin-bottom: 8px; }
.pl-chip  {
  display: inline-block; font-size: 0.58rem; padding: 2px 8px; border-radius: 20px;
  color: #fff; letter-spacing: 0.04em; opacity: 0.88; margin-bottom: 16px; align-self: flex-start;
}
.pl-rule  { width: 22px; height: 1px; background: var(--border); margin-bottom: 14px; }
.pl-text  {
  flex: 1; font-size: clamp(0.8rem, 1.55vw, 0.92rem); line-height: 1.9;
  color: var(--text); overflow-y: auto;
}
.pl-text::-webkit-scrollbar { width: 2px; }
.pl-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }
.pl-foot  { margin-top: 10px; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; }

/* ── Right page inner (image) ─────────────────────── */
.pr-inner {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.pr-inner img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
}
.pr-ph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; letter-spacing: 0.14em; color: var(--border);
  text-transform: uppercase; background: var(--page-r);
}

/* ══════════════════════════════════════════════════════
   3-D PAGE FLIPPER
   Covers the right page exactly.
   transform-origin: left center  →  rotates around the spine.
   ══════════════════════════════════════════════════════ */
#flipper-wrap {
  position: absolute;
  top: 0; right: 0;
  width: calc(50% - 3px);   /* exact right-page width */
  height: 100%;
  perspective: 1800px;
  z-index: 10;
  pointer-events: none;     /* clicks fall through by default */
}

#page-flipper {
  position: absolute;
  inset: 0;
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000);
}
#page-flipper.is-flipping { transform: rotateY(-180deg); }

.flip-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
/* Front = current right-page image */
.flip-front {
  background: var(--page-r);
  display: flex; align-items: center; justify-content: center;
}
.flip-front img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

/* Back = next panel text; faces viewer when flipper reaches -180° */
.flip-back {
  background: var(--page-l);
  transform: rotateY(180deg);
  padding: 26px 22px 18px;
  display: flex; flex-direction: column;
}

/* ── Footer: dots + nav ────────────────────────────── */
.book-footer {
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: center;
  gap: 18px;
  padding: 8px 16px 12px;
}
.nav-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1.15rem;
  color: var(--muted);
  flex-shrink: 0;
  line-height: 1;
  transition: background 0.12s, color 0.12s;
}
.nav-btn:hover { background: var(--border); color: var(--text); }
.nav-btn:disabled { opacity: 0.22; cursor: default; }

.panel-dots { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.pdot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); transition: background 0.2s;
}
.pdot.active { background: var(--muted); }

/* ── Mobile fallback (≤ 580px) ──────────────────────── */
@media (max-width: 580px) {
  .book-spread {
    flex-direction: column;
    height: auto;
    max-height: calc(100vh - 108px);
    border-radius: 4px;
  }
  .book-page { flex: none; }
  .page-left  { max-height: 30vh; border-radius: 4px 4px 0 0; }
  .page-right { height: min(56vw * 16/9, 52vh); border-radius: 0 0 4px 4px; }
  .book-spine { flex: 0 0 1px; background: var(--border); }
  #flipper-wrap { display: none; } /* use simple fade on mobile */
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     VIEW 1 — COVER (click anywhere to enter)
     ════════════════════════════════════════════ -->
<div id="view-cover" class="view active" onclick="showTOC()">
  <div class="cover-inner">
    <div class="cover-rule-top"></div>
    <div class="cover-zh">夢裡夢外</div>
    <div class="cover-en">Among All Dreams</div>
    <div class="cover-mid">
      <div class="cover-line"></div>
      <div class="cover-dot"></div>
      <div class="cover-line"></div>
    </div>
    <div class="cover-author">Eve &middot; 2026</div>
    <div class="cover-hint">點擊翻開</div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     VIEW 2 — TABLE OF CONTENTS
     ════════════════════════════════════════════ -->
<div id="view-toc" class="view">
  <div class="toc-header">
    <button class="toc-back" onclick="showCover()">← 封面</button>
    <span class="toc-heading">夢裡夢外</span>
    <div class="toc-spacer"></div>
  </div>
  <div class="toc-grid" id="toc-grid"></div>
</div>

<!-- ════════════════════════════════════════════
     VIEW 3 — BOOK SPREAD
     ════════════════════════════════════════════ -->
<div id="view-book" class="view">

  <!-- Header bar -->
  <div class="book-hdr">
    <button class="bh-btn" onclick="showTOC()">目錄</button>
    <span class="bh-info" id="bh-info"></span>
    <span class="bh-phase" id="bh-phase"></span>
    <button class="bh-btn" id="bh-prev" onclick="prevDream()">‹ 上夢</button>
    <button class="bh-btn" id="bh-next" onclick="nextDream()">下夢 ›</button>
  </div>

  <!-- Book stage -->
  <div class="book-stage">
    <div class="book-spread">

      <!-- LEFT PAGE — text -->
      <div class="book-page page-left">
        <div class="pl-inner">
          <div class="pl-num"   id="pl-num"></div>
          <div class="pl-title" id="pl-title"></div>
          <div class="pl-chip"  id="pl-chip"></div>
          <div class="pl-rule"></div>
          <div class="pl-text"  id="pl-text"></div>
          <div class="pl-foot"  id="pl-foot"></div>
        </div>
      </div>

      <!-- SPINE -->
      <div class="book-spine"></div>

      <!-- RIGHT PAGE — image -->
      <div class="book-page page-right">
        <div class="pr-inner">
          <img id="right-img" src="" alt="" />
          <div class="pr-ph" id="right-ph" style="display:none">image</div>
        </div>
      </div>

      <!-- 3-D FLIPPER — covers right page, rotates around spine -->
      <div id="flipper-wrap">
        <div id="page-flipper">

          <!-- Front face: current right-page image -->
          <div class="flip-face flip-front">
            <img id="fl-img" src="" alt="" />
          </div>

          <!-- Back face: next panel's text (becomes new left page after flip) -->
          <div class="flip-face flip-back">
            <div class="pl-num"   id="fl-num"></div>
            <div class="pl-title" id="fl-title"></div>
            <div class="pl-chip"  id="fl-chip"></div>
            <div class="pl-rule"></div>
            <div class="pl-text"  id="fl-text"></div>
            <div class="pl-foot"  id="fl-foot"></div>
          </div>

        </div>
      </div>
      <!-- /flipper -->

    </div><!-- /book-spread -->
  </div><!-- /book-stage -->

  <!-- Footer: panel navigation -->
  <div class="book-footer">
    <button class="nav-btn" id="btn-prev" onclick="flipPrev()" aria-label="上一頁">&#8249;</button>
    <div class="panel-dots" id="panel-dots"></div>
    <button class="nav-btn" id="btn-next" onclick="flipNext()" aria-label="下一頁">&#8250;</button>
  </div>

</div><!-- /view-book -->

<script>
// ─────────────────────────────────────────────────────
// PHASE MAP
// ─────────────────────────────────────────────────────
const PHASES = {
  '出發':      'departure',
  '失去':      'loss',
  '暴力與覺察': 'violence',
  '心死':      'heartdead',
  '重建':      'rebuild',
  '行動的呼喚': 'action',
  '飛起':      'fly',
  '浮起':      'float',
};

// ─────────────────────────────────────────────────────
// DREAM DATA
// ─────────────────────────────────────────────────────
const DREAMS = [
  {
    id: '01', title: '中式大宅中轉站', phase: '出發', panelCount: 7,
    panels: [
      '我住在那棟宅子的時間比所有人都長。',
      '門廊、走廊、每一個轉角，我都認識。朋友們住在不同的樓層和房間，偶爾遇上，我只問一件事：「你什麼時候要走？」',
      '每次擁抱都用力。因為下一站各散東西，不知道還會不會再見。',
      '有一天，兩個人來找住在宅子裡的某個人。我幫他們尋找，走錯了方向，推開了幾扇不認識的門。裡面的房間很奇怪——由網格組成，橫向伸展，像懸在半空的陽台，四面全是格子，只容得下一個人。',
      '幾間都找不到人。最後我站在黑暗的走廊裡，大聲叫她的名字。',
      '才在一間正常的房間裡找到她，和另外兩個朋友住在一起。',
      '後來我把網格房的事告訴別人。她們都說：「沒有這樣的房間。」',
    ],
  },
  {
    id: '02', title: '後樓梯殘缺樂器追逐', phase: '出發', panelCount: 7,
    panels: [
      '整個世界是灰色的。',
      '後樓梯比正常的更窄，梯級扁平，可以一跳越過半層。我和男朋友非常緊張地往下走。下面有出口，我們只想快點出去。',
      '某一層，一個女生靠在牆邊。她扶著破掉一半的樂器，好像要演奏，又好像要介紹。她的手腕不在身上，落在地板上。',
      '我們沒有停。快速掠過她，繼續往下走。',
      '下一層，又是一件破損的樂器。再下一層，又是。那個女生的腳步聲在身後響起，不緊不慢，一直跟著。我們越走越快。',
      '出到街道，直接上了車。我坐定，回頭望著門口等，看她有沒有跟出來。',
      '走出來的是一位普通的婦人。那個女生不見了。車沒有立刻開走。我沒有回頭看後座。但我的整個身體都知道——她在那裡。',
    ],
  },
  {
    id: '07', title: '流浪漢昏迷自醒', phase: '失去', panelCount: 6,
    panels: [
      '大雪。',
      '車房外，有一個流浪漢靠著我的車坐著，蓋著什麼在睡覺。我是去拿東西才走進去的，看到他，他也看到我，用眼神問我。',

      '然後我沉下去，很深的地方，深呼了一口氣，說：「醒。」我睜開眼，躺在自己的床上，天亮了。',

    ],
  },
  {
    id: '17', title: '貓生病電梯', phase: '失去', panelCount: 6,
    panels: [
      '整個世界是灰黑色和暗綠色。',

      '泥漿裡有一扇木門，漂著。我找到它，爬上去。',
      '沒有猶豫。',
      null,
    ],
  },
];

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let dreamIdx = 0;
let panelIdx = 0;
let flipping = false;

// ─────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────
function phClass(phase) {
  return 'ph-' + (PHASES[phase] || 'departure');
}

function imgSrc(id, pi) {
  return 'images/dream-' + id + '/panel-' + String(pi + 1).padStart(2, '0') + '.png';
}

function setImgSrc(el, id, pi) {
  const src = imgSrc(id, pi);
  el.src = src;
  el.onerror = function () {
    this.onerror = null;
    this.src = src.replace('.png', '.jpg');
  };
}

// ─────────────────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}
function showCover() { showView('cover'); }

function showTOC() {
  buildTOC();
  showView('toc');
}

function openDream(di) {
  dreamIdx = di;
  panelIdx = 0;
  showView('book');
  renderBook();
}

// ─────────────────────────────────────────────────────
// TOC — build once
// ─────────────────────────────────────────────────────
let tocBuilt = false;
function buildTOC() {
  if (tocBuilt) return;
  tocBuilt = true;
  const grid = document.getElementById('toc-grid');
  DREAMS.forEach((d, di) => {
    const card = document.createElement('div');
    card.className = 'toc-card';
    card.innerHTML =
      '<div class="toc-stripe ' + phClass(d.phase) + '"></div>' +
      '<div class="toc-body">' +
        '<div class="toc-num"># ' + d.id + '</div>' +
        '<div class="toc-title">' + d.title + '</div>' +
        '<span class="toc-chip ' + phClass(d.phase) + '">' + d.phase + '</span>' +
      '</div>';
    card.addEventListener('click', () => openDream(di));
    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────────────────
// RENDER BOOK
// ─────────────────────────────────────────────────────
function renderBook() {
  const dream = DREAMS[dreamIdx];
  const text  = dream.panels[panelIdx] || null;

  // ── Header ──
  document.getElementById('bh-info').textContent =
    '夢 ' + dream.id + ' — ' + dream.title;
  const bpEl = document.getElementById('bh-phase');
  bpEl.textContent = dream.phase;
  bpEl.className   = 'bh-phase ' + phClass(dream.phase);
  document.getElementById('bh-prev').disabled = dreamIdx === 0;
  document.getElementById('bh-next').disabled = dreamIdx === DREAMS.length - 1;

  // ── Left page ──
  document.getElementById('pl-num').textContent   = '夢 ' + dream.id;
  document.getElementById('pl-title').textContent = dream.title;
  const plChip = document.getElementById('pl-chip');
  plChip.textContent = dream.phase;
  plChip.className   = 'pl-chip ' + phClass(dream.phase);
  document.getElementById('pl-text').textContent  = text || '';
  document.getElementById('pl-foot').textContent  =
    (panelIdx + 1) + ' / ' + dream.panelCount;

  // ── Right page image ──
  const rImg = document.getElementById('right-img');
  const rPh  = document.getElementById('right-ph');
  rImg.style.display = 'block';
  rPh.style.display  = 'none';
  setImgSrc(rImg, dream.id, panelIdx);
  rImg.onerror = (function (id, pi) {
    return function () {
      this.onerror = null;
      const jpg = imgSrc(id, pi).replace('.png', '.jpg');
      this.src = jpg;
      this.onerror = function () {
        this.style.display = 'none';
        rPh.style.display  = 'flex';
      };
    };
  }(dream.id, panelIdx));

  // ── Flipper FRONT (mirrors right page) ──
  setImgSrc(document.getElementById('fl-img'), dream.id, panelIdx);

  // ── Flipper BACK (next panel → becomes new left after flip) ──
  prepareFlipperBack();

  // ── Dots ──
  const dotsEl = document.getElementById('panel-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < dream.panelCount; i++) {
    const d = document.createElement('span');
    d.className = 'pdot' + (i === panelIdx ? ' active' : '');
    dotsEl.appendChild(d);
  }

  // ── Nav buttons ──
  document.getElementById('btn-prev').disabled = panelIdx === 0;
  document.getElementById('btn-next').disabled = panelIdx >= dream.panelCount - 1;
}

function prepareFlipperBack() {
  const dream  = DREAMS[dreamIdx];
  const nextPi = panelIdx + 1;
  if (nextPi < dream.panelCount) {
    const nextText = dream.panels[nextPi] || '';
    document.getElementById('fl-num').textContent   = '夢 ' + dream.id;
    document.getElementById('fl-title').textContent = dream.title;
    const fc = document.getElementById('fl-chip');
    fc.textContent = dream.phase;
    fc.className   = 'pl-chip ' + phClass(dream.phase);
    document.getElementById('fl-text').textContent  = nextText;
    document.getElementById('fl-foot').textContent  =
      (nextPi + 1) + ' / ' + dream.panelCount;
  }
}

// ─────────────────────────────────────────────────────
// FLIP NEXT — right page flips left (CSS 3-D)
// ─────────────────────────────────────────────────────
function flipNext() {
  const dream = DREAMS[dreamIdx];
  if (flipping || panelIdx >= dream.panelCount - 1) return;
  flipping = true;

  const flipper = document.getElementById('page-flipper');
  flipper.classList.add('is-flipping');

  flipper.addEventListener('transitionend', function handler() {
    flipper.removeEventListener('transitionend', handler);

    panelIdx++;

    // Instant reset — no animation for the snap-back
    flipper.style.transition = 'none';
    flipper.classList.remove('is-flipping');

    renderBook();

    // Re-enable transition after two rAF cycles
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        flipper.style.transition = '';
        flipping = false;
      });
    });
  }, { once: true });
}

// ─────────────────────────────────────────────────────
// FLIP PREV — instant update (no 3-D needed for going back)
// ─────────────────────────────────────────────────────
function flipPrev() {
  if (flipping || panelIdx <= 0) return;
  panelIdx--;
  renderBook();
}

// ─────────────────────────────────────────────────────
// DREAM NAVIGATION
// ─────────────────────────────────────────────────────
function prevDream() {
  if (dreamIdx > 0) { dreamIdx--; panelIdx = 0; renderBook(); }
}
function nextDream() {
  if (dreamIdx < DREAMS.length - 1) { dreamIdx++; panelIdx = 0; renderBook(); }
}

// ─────────────────────────────────────────────────────
// TOUCH SWIPE
// ─────────────────────────────────────────────────────
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => {
  tx = e.changedTouches[0].clientX;
  ty = e.changedTouches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) flipNext();
    else         flipPrev();
  }
}, { passive: true });

// ─────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') flipNext();
  if (e.key === 'ArrowLeft')  flipPrev();
  if (e.key === 'Escape')     showTOC();
});
</script>
</body>
</html>
