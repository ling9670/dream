<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夢裡夢外 — Among All Dreams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #F7F4EF;
  --text:        #2C2A27;
  --text-muted:  #7A7670;
  --border:      #DDD9D0;
  --font-serif:  'Noto Serif TC', 'Songti SC', serif;

  --phase-departure: #C4B49A;
  --phase-loss:      #8B9EA8;
  --phase-violence:  #A8896C;
  --phase-heartdead: #6B7280;
  --phase-rebuild:   #7A9E87;
  --phase-action:    #9B7B9E;
  --phase-fly:       #B8A9C9;
  --phase-float:     #A9C4C0;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-serif);
  touch-action: pan-y;
}

/* ── FLIPBOOK SHELL ─────────────────────────────────── */
#flipbook {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── HEADER BAR ─────────────────────────────────────── */
#header {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  z-index: 20;
  position: relative;
}

.hdr-dream-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hdr-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  font-family: var(--font-serif);
  font-size: 0.75rem;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  flex-shrink: 0;
}
.hdr-btn:hover { background: var(--border); color: var(--text); }
.hdr-btn:disabled { opacity: 0.3; cursor: default; }

#dream-label {
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  text-decoration: underline dotted;
  text-underline-offset: 2px;
  user-select: none;
}
#dream-label:hover { color: var(--text); }

.hdr-phase-chip {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 20px;
  color: #fff;
  letter-spacing: 0.06em;
  flex-shrink: 0;
  opacity: 0.9;
}

/* ── PAGE STAGE ─────────────────────────────────────── */
#stage {
  flex: 1 1 0;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
}

/* ── PAGE CARD ──────────────────────────────────────── */
.page-card {
  position: absolute;
  width: min(320px, calc(100vw - 96px));
  max-height: calc(100vh - 120px);
  display: flex;
  flex-direction: column;
  align-items: center;
  backface-visibility: hidden;
  will-change: transform;
  transform-origin: center center;
  transition: transform 0.5s ease;
}

/* ── PANEL IMAGE ────────────────────────────────────── */
.panel-img-wrap {
  width: 100%;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #E8E4DC;
  flex-shrink: 0;
}
.panel-img-wrap::before {
  content: '';
  display: block;
  padding-top: 177.78%; /* 9:16 */
}
.panel-img-wrap img,
.panel-img-wrap .img-placeholder {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 8px;
}
.img-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #B0ABA2;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: #E8E4DC;
}

/* Cap image height to 65vh */
@media (min-height: 600px) {
  .panel-img-wrap {
    max-height: 65vh;
    overflow: hidden;
  }
  .panel-img-wrap::before { display: none; }
  .panel-img-wrap img,
  .panel-img-wrap .img-placeholder {
    position: relative;
    height: 65vh;
    width: auto;
    max-width: 100%;
    margin: 0 auto;
    display: block;
  }
}

/* ── PANEL TEXT ─────────────────────────────────────── */
.panel-text-wrap {
  width: 100%;
  margin-top: 12px;
  padding: 0 4px;
  font-size: 0.9rem;
  line-height: 1.75;
  color: var(--text);
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 4;
  overflow: hidden;
}

/* ── DOT INDICATOR ──────────────────────────────────── */
#dots {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 8px 16px 6px;
  flex-wrap: wrap;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s;
}
.dot.active { background: var(--text-muted); }

/* ── NAV ARROWS ─────────────────────────────────────── */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  transition: background 0.12s, box-shadow 0.12s;
  color: var(--text-muted);
  font-size: 1.2rem;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.nav-arrow:hover { background: var(--border); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.nav-arrow:active { transform: translateY(-50%) scale(0.95); }
.nav-arrow:disabled { opacity: 0.25; cursor: default; }
#btn-prev { left: 8px; }
#btn-next { right: 8px; }

/* ── COVER PAGE ─────────────────────────────────────── */
.cover-page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  text-align: center;
  padding: 32px 24px;
  gap: 12px;
}
.cover-title {
  font-size: 2.2rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  line-height: 1.2;
}
.cover-subtitle {
  font-size: 0.8rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 4px;
}
.cover-author {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  margin-top: 8px;
}
.cover-divider {
  width: 48px;
  height: 1px;
  background: var(--border);
  margin: 8px auto;
}
.cover-hint {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-top: 16px;
  opacity: 0.7;
}

/* ── BACK COVER ─────────────────────────────────────── */
.back-cover-page {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.fin-text {
  font-size: 1.4rem;
  color: var(--text-muted);
  letter-spacing: 0.18em;
  font-style: italic;
}

/* ── DREAM LIST OVERLAY ─────────────────────────────── */
#dream-list-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,42,39,0.55);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  padding-top: 56px;
}
#dream-list-overlay.open {
  display: flex;
}
#dream-list-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: min(380px, calc(100vw - 32px));
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  padding: 0;
}
.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 1;
}
.overlay-title {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}
.overlay-close {
  background: none;
  border: none;
  font-size: 1.1rem;
  cursor: pointer;
  color: var(--text-muted);
  padding: 4px;
  line-height: 1;
}
.overlay-close:hover { color: var(--text); }

.dream-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.dream-list-item:last-child { border-bottom: none; }
.dream-list-item:hover { background: #F0EDE7; }
.dream-list-item.current { background: #EDEAE4; }
.dli-num {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  width: 32px;
  flex-shrink: 0;
}
.dli-title {
  font-size: 0.85rem;
  flex: 1;
  line-height: 1.3;
}
.dli-chip {
  font-size: 0.6rem;
  padding: 2px 7px;
  border-radius: 20px;
  color: #fff;
  opacity: 0.85;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}

/* ── PHASE COLORS ───────────────────────────────────── */
.phase-departure  { background-color: var(--phase-departure); }
.phase-loss       { background-color: var(--phase-loss); }
.phase-violence   { background-color: var(--phase-violence); }
.phase-heartdead  { background-color: var(--phase-heartdead); }
.phase-rebuild    { background-color: var(--phase-rebuild); }
.phase-action     { background-color: var(--phase-action); }
.phase-fly        { background-color: var(--phase-fly); }
.phase-float      { background-color: var(--phase-float); }

/* ── FLIP ANIMATION CLASSES ─────────────────────────── */
.flip-exit-left  { animation: flipExitLeft  0.5s ease forwards; }
.flip-exit-right { animation: flipExitRight 0.5s ease forwards; }
.flip-enter-left { animation: flipEnterLeft  0.5s ease forwards; }
.flip-enter-right{ animation: flipEnterRight 0.5s ease forwards; }

@keyframes flipExitLeft {
  from { transform: rotateY(0deg);    opacity: 1; }
  50%  { transform: rotateY(-90deg);  opacity: 0; }
  to   { transform: rotateY(-90deg);  opacity: 0; visibility: hidden; }
}
@keyframes flipExitRight {
  from { transform: rotateY(0deg);   opacity: 1; }
  50%  { transform: rotateY(90deg);  opacity: 0; }
  to   { transform: rotateY(90deg);  opacity: 0; visibility: hidden; }
}
@keyframes flipEnterLeft {
  from { transform: rotateY(90deg);  opacity: 0; }
  50%  { transform: rotateY(90deg);  opacity: 0; }
  to   { transform: rotateY(0deg);   opacity: 1; }
}
@keyframes flipEnterRight {
  from { transform: rotateY(-90deg); opacity: 0; }
  50%  { transform: rotateY(-90deg); opacity: 0; }
  to   { transform: rotateY(0deg);   opacity: 1; }
}
</style>
</head>
<body>
<div id="flipbook">
  <div id="header">
    <div class="hdr-dream-nav">
      <button class="hdr-btn" id="btn-dream-prev" title="上一個夢">‹</button>
      <span id="dream-label">夢 00 / 18</span>
      <button class="hdr-btn" id="btn-dream-next" title="下一個夢">›</button>
    </div>
    <span class="hdr-phase-chip" id="phase-chip"></span>
  </div>

  <div id="stage">
    <button class="nav-arrow" id="btn-prev" aria-label="上一頁">&#8249;</button>
    <div id="page-current" class="page-card"></div>
    <div id="page-next"    class="page-card" style="display:none"></div>
    <button class="nav-arrow" id="btn-next" aria-label="下一頁">&#8250;</button>
  </div>

  <div id="dots"></div>
</div>

<!-- Dream list overlay -->
<div id="dream-list-overlay" role="dialog" aria-modal="true" aria-label="選擇夢境">
  <div id="dream-list-panel">
    <div class="overlay-header">
      <span class="overlay-title">所有夢境</span>
      <button class="overlay-close" id="btn-overlay-close" aria-label="關閉">&#10005;</button>
    </div>
    <div id="dream-list-items"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
// PHASE MAP
// ─────────────────────────────────────────────────────
const PHASES = {
  '出發':     'departure',
  '失去':     'loss',
  '暴力與覺察': 'violence',
  '心死':     'heartdead',
  '重建':     'rebuild',
  '行動的呼喚': 'action',
  '飛起':     'fly',
  '浮起':     'float',
};

// ─────────────────────────────────────────────────────
// DREAM DATA
// panels: array of storybook text per panel (null = image only)
// panelCount: FINAL image count
// ─────────────────────────────────────────────────────
const DREAMS = [
  {
    id: '01', title: '中式大宅中轉站', phase: '出發', panelCount: 7,
    panels: [
      '我住在那棟宅子的時間比所有人都長。',
      '門廊、走廊、每一個轉角，我都認識。朋友們住在不同的樓層和房間，偶爾遇上，我只問一件事：「你什麼時候要走？」',
      '每次擁抱都用力。因為下一站各散東西，不知道還會不會再見。',
      '有一天，兩個人來找住在宅子裡的某個人。我幫他們尋找，走錯了方向，推開了幾扇不認識的門。裡面的房間很奇怪——由網格組成，橫向伸展，像懸在半空的陽台，四面全是格子，只容得下一個人。',
      '幾間都找不到人。最後我站在黑暗的走廊裡，大聲叫她的名字。',
      '才在一間正常的房間裡找到她，和另外兩個朋友住在一起。',
      '後來我把網格房的事告訴別人。她們都說：「沒有這樣的房間。」',
    ],
  },
  {
    id: '02', title: '後樓梯殘缺樂器追逐', phase: '出發', panelCount: 7,
    panels: [
      '整個世界是灰色的。',
      '後樓梯比正常的更窄，梯級扁平，可以一跳越過半層。我和男朋友非常緊張地往下走。下面有出口，我們只想快點出去。',
      '某一層，一個女生靠在牆邊。她扶著破掉一半的樂器，好像要演奏，又好像要介紹。她的手腕不在身上，落在地板上。',
      '我們沒有停。快速掠過她，繼續往下走。',
      '下一層，又是一件破損的樂器。再下一層，又是。那個女生的腳步聲在身後響起，不緊不慢，一直跟著。我們越走越快。',
      '出到街道，直接上了車。我坐定，回頭望著門口等，看她有沒有跟出來。',
      '走出來的是一位普通的婦人。那個女生不見了。車沒有立刻開走。我沒有回頭看後座。但我的整個身體都知道——她在那裡。',
    ],
  },
  {
    id: '07', title: '流浪漢昏迷自醒', phase: '失去', panelCount: 6,
    panels: [
      '大雪。',
      '車房外，有一個流浪漢靠著我的車坐著，蓋著什麼在睡覺。我是去拿東西才走進去的，看到他，他也看到我，用眼神問我。',
      '我答應了他。他可以在車房裡過一夜。床憑空出現了，就在車房裡。他去睡了。',
      '我不知道是什麼時候、用什麼方式昏迷的。意識還在，身體不動。我感覺到他靠近，感覺到他觸碰我，在心裡喊「不要碰我」，但說不出聲，也動不了。',
      '這樣過了一段時間。',
      '然後我沉下去，很深的地方，深呼了一口氣，說：「醒。」我睜開眼，躺在自己的床上，天亮了。',
    ],
  },
  {
    id: '15', title: '廢物箱尋寶中學朋友', phase: '失去', panelCount: 6,
    panels: [
      '學校或大學的某個角落，有三個大紙箱。',
      '裡面是賣剩的貨、瑕疵品，有些拆了包裝，有些已經壞了，但可以帶走。我和她發現這個地方的時候都很開心，立刻翻起來。',
      '她是我中學時最好的朋友。畢業之後，我們就沒有再聯絡。',
      '走廊有人說隔壁大樓起火，嗅到一點煙味，我們繼續翻箱，完全沒有管。',
      '開心是真實的。不是因為得到了什麼，是因為在她面前，不需要裝，不需要管面子，想拿免費的破爛就拿，想翻垃圾就翻。',
      '她比我更開心，她比我更先伸手進去。',
    ],
  },
  {
    id: '17', title: '貓生病電梯', phase: '失去', panelCount: 6,
    panels: [
      '整個世界是灰黑色和暗綠色。',
      '男朋友把我的貓帶去了動物醫院。我是後來才知道的，知道後立刻跑過去，推開醫生的房間門，警告他：要好好治療我的貓。',
      '我不記得為什麼那麼大情緒，但我是生氣的。說完又怕自己的怒氣影響治療，立刻切換語氣，好好拜託他。醫生有點不悅，只說：「我會讓下一個值班的醫生知道。」',
      '電梯大堂有兩部電梯。左邊那部不能進，我說不清為什麼，但就是知道。我站在右邊等，心裡有點害怕。',
      '一位清潔大嬸推著清潔車走過來，也在等。她什麼都沒說，只是站在那裡。我的害怕就消失了。',
      '電梯門開了，裡面已經有人，他們拿著非常巨大但很輕盈的東西，霸了三分之一的空間。門關上之後，我被推到靠近門口的位置。然後就忘記了。',
    ],
  },
  {
    id: '26', title: '商場買鞋偷錢包搶劫', phase: '暴力與覺察', panelCount: 7,
    panels: [
      '我在選鞋。男朋友走過來，拿兩張卡給我看，說買某個白色錢包有很大的折扣。我在選鞋，讓他自己處理。',
      '店員說超過關門時間，請大家離開。我走出去，男朋友在外面等我，手上有兩個白色錢包。他說沒有人發現，因為關門了。他偷的。我就拿走了。',
      '走在路上，有人衝出來搶包，左手一條燒肉，右手幾把刀，周圍的人都散開了。我不讓他拿包，扭打，最後制服了他。',
      '男朋友站在旁邊，好像不太明白為什麼我要這麼堅持。我叫他報警。他把電話遞給旁邊幾個人，讓我自己處理。',
      '警察來了，看到那條燒肉，切開，開始吃，還分給旁邊的人和男朋友，吃得很開心。',
      '我按著那個人，看著他們吃。',
      '最後我和男朋友離開現場，我告訴他我們分手。我拿走了我自己的兩部電話，上了天橋，一個人走。他留在原地，沒有追。草叢裡有聲音。兩隻黑白貓走出來，停在那裡看著我，然後走了。',
    ],
  },
  {
    id: '28', title: '荒廢豪宅十億寶藏', phase: '暴力與覺察', panelCount: 8,
    panels: [
      '豪宅已經有些倒塌了。我不知道怎麼到了這裡，到了之後才發現裡面已經有兩個人：一個年輕警察，一個中年工人。',
      '警察和我一起走，他保護我，我跟著他。工人另走一路，去到地下一個洞。他說裡面有十億。',

// ─────────────────────────────────────────────────────
// BUILD PAGE INDEX
// Pages: cover (0), dreams (each dream: N panels), back cover (last)
// ─────────────────────────────────────────────────────

// page = { type: 'cover' | 'panel' | 'backcover', dreamIdx, panelIdx }
const PAGES = [];
PAGES.push({ type: 'cover' });
for (let di = 0; di < DREAMS.length; di++) {
  const d = DREAMS[di];
  for (let pi = 0; pi < d.panelCount; pi++) {
    PAGES.push({ type: 'panel', dreamIdx: di, panelIdx: pi });
  }
}
PAGES.push({ type: 'backcover' });

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let currentPage = 0;
let animating = false;

// ─────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────
function phaseClass(phase) {
  return 'phase-' + (PHASES[phase] || 'departure');
}

function imgSrc(dreamId, panelNum) {
  const pad = String(panelNum + 1).padStart(2, '0');
  return 'images/dream-' + dreamId + '/panel-' + pad + '.png';
}

function imgFallback(el, dreamId, panelNum) {
  const pad = String(panelNum + 1).padStart(2, '0');
  const jpg = 'images/dream-' + dreamId + '/panel-' + pad + '.jpg';
  if (el.src.endsWith('.png')) {
    el.src = jpg;
  } else {
    el.style.display = 'none';
    const ph = el.parentNode.querySelector('.img-placeholder');
    if (ph) ph.style.display = 'flex';
  }
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────
// BUILD PAGE HTML
// ─────────────────────────────────────────────────────
function buildPageContent(pageIdx) {
  const pg = PAGES[pageIdx];
  if (!pg) return '';

  if (pg.type === 'cover') {
    return '<div class="cover-page">' +
      '<div class="cover-title">夢裡夢外</div>' +
      '<div class="cover-divider"></div>' +
      '<div class="cover-subtitle">Among All Dreams</div>' +
      '<div class="cover-author">Eve &middot; 2026</div>' +
      '<div class="cover-hint">← 翻頁開始 →</div>' +
      '</div>';
  }

  if (pg.type === 'backcover') {
    return '<div class="back-cover-page"><span class="fin-text">fin.</span></div>';
  }

  // panel page
  const dream = DREAMS[pg.dreamIdx];
  const text = dream.panels[pg.panelIdx];
  const src = imgSrc(dream.id, pg.panelIdx);

  return '<div class="panel-img-wrap" id="img-wrap-' + pageIdx + '">' +
    '<img src="' + src + '" alt="' + escHtml(dream.title) + ' panel ' + (pg.panelIdx + 1) + '" ' +
      'onerror="imgFallback(this,\'' + dream.id + '\',' + pg.panelIdx + ')" loading="lazy">' +
    '<div class="img-placeholder" style="display:none">P' + String(pg.panelIdx + 1).padStart(2,'0') + '</div>' +
    '</div>' +
    (text ? '<div class="panel-text-wrap">' + escHtml(text) + '</div>' : '');
}

// ─────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────
function renderPage(pageIdx, el) {
  el.innerHTML = buildPageContent(pageIdx);
  el.style.display = 'flex';
}

function updateHeader() {
  const pg = PAGES[currentPage];
  const dreamLabel = document.getElementById('dream-label');
  const phaseChip  = document.getElementById('phase-chip');
  const btnDPrev   = document.getElementById('btn-dream-prev');
  const btnDNext   = document.getElementById('btn-dream-next');

  if (pg.type === 'cover' || pg.type === 'backcover') {
    dreamLabel.textContent = pg.type === 'cover' ? '夢裡夢外' : '完';
    phaseChip.textContent = '';
    phaseChip.className = 'hdr-phase-chip';
    btnDPrev.disabled = true;
    btnDNext.disabled = true;
    return;
  }

  const di = pg.dreamIdx;
  const dream = DREAMS[di];
  dreamLabel.textContent = '夢 ' + String(di + 1).padStart(2,'0') + ' / ' + DREAMS.length + ' · ' + dream.title.substring(0, 8);
  phaseChip.textContent = dream.phase;
  phaseChip.className = 'hdr-phase-chip ' + phaseClass(dream.phase);

  // dream nav
  // prev dream: is there a dream before di?
  const prevDreamFirstPage = di > 0
    ? PAGES.findIndex(p => p.type === 'panel' && p.dreamIdx === di - 1)
    : -1;
  const nextDreamFirstPage = di < DREAMS.length - 1
    ? PAGES.findIndex(p => p.type === 'panel' && p.dreamIdx === di + 1)
    : -1;

  btnDPrev.disabled = prevDreamFirstPage === -1;
  btnDNext.disabled = nextDreamFirstPage === -1;

  btnDPrev.onclick = () => { if (prevDreamFirstPage !== -1) goToPage(prevDreamFirstPage, 'right'); };
  btnDNext.onclick = () => { if (nextDreamFirstPage !== -1) goToPage(nextDreamFirstPage, 'left'); };
}

function updateDots() {
  const dotsEl = document.getElementById('dots');
  const pg = PAGES[currentPage];

  if (pg.type === 'cover' || pg.type === 'backcover') {
    dotsEl.innerHTML = '';
    return;
  }

  const di = pg.dreamIdx;
  const dream = DREAMS[di];
  const firstPageOfDream = PAGES.findIndex(p => p.type === 'panel' && p.dreamIdx === di);

  dotsEl.innerHTML = '';
  for (let i = 0; i < dream.panelCount; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === pg.panelIdx ? ' active' : '');
    dotsEl.appendChild(dot);
  }
}

function updateNavArrows() {
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage === PAGES.length - 1;
}

function fullRender() {
  const cur = document.getElementById('page-current');
  renderPage(currentPage, cur);
  cur.classList.remove('flip-exit-left','flip-exit-right','flip-enter-left','flip-enter-right');
  updateHeader();
  updateDots();
  updateNavArrows();
}

// ─────────────────────────────────────────────────────
// FLIP ANIMATION
// direction: 'left' (go to next), 'right' (go to prev)
// ─────────────────────────────────────────────────────
function goToPage(targetPage, direction) {
  if (animating) return;
  if (targetPage < 0 || targetPage >= PAGES.length) return;
  if (targetPage === currentPage) return;

  animating = true;

  const cur  = document.getElementById('page-current');
  const next = document.getElementById('page-next');

  // Prepare next page content (hidden behind)
  renderPage(targetPage, next);
  next.style.display = 'flex';

  const exitAnim  = direction === 'left' ? 'flip-exit-left'  : 'flip-exit-right';
  const enterAnim = direction === 'left' ? 'flip-enter-left' : 'flip-enter-right';

  // Animate current out
  cur.classList.add(exitAnim);

  // After halfway (250ms), swap visibility — animate next in
  setTimeout(() => {
    cur.style.display = 'none';
    cur.classList.remove(exitAnim);

    // Swap DOM roles
    cur.id = 'page-next';
    next.id = 'page-current';

    next.classList.add(enterAnim);
    next.addEventListener('animationend', () => {
      next.classList.remove(enterAnim);
      animating = false;
      // Clean up old page
      document.getElementById('page-next').innerHTML = '';
      document.getElementById('page-next').style.display = 'none';
    }, { once: true });

    currentPage = targetPage;
    updateHeader();
    updateDots();
    updateNavArrows();
  }, 250);
}

function goNext() {
  if (currentPage < PAGES.length - 1) goToPage(currentPage + 1, 'left');
}

function goPrev() {
  if (currentPage > 0) goToPage(currentPage - 1, 'right');
}

// ─────────────────────────────────────────────────────
// DREAM LIST OVERLAY
// ─────────────────────────────────────────────────────
function buildDreamList() {
  const container = document.getElementById('dream-list-items');
  container.innerHTML = '';
  DREAMS.forEach((d, di) => {
    const pg = PAGES[currentPage];
    const isCurrent = pg.type === 'panel' && pg.dreamIdx === di;
    const item = document.createElement('div');
    item.className = 'dream-list-item' + (isCurrent ? ' current' : '');
    item.innerHTML =
      '<span class="dli-num">#' + d.id + '</span>' +
      '<span class="dli-title">' + escHtml(d.title) + '</span>' +
      '<span class="dli-chip ' + phaseClass(d.phase) + '">' + escHtml(d.phase) + '</span>';
    item.addEventListener('click', () => {
      closeOverlay();
      const firstPage = PAGES.findIndex(p => p.type === 'panel' && p.dreamIdx === di);
      const pg2 = PAGES[currentPage];
      const curDi = pg2.type === 'panel' ? pg2.dreamIdx : -1;
      const dir = di >= curDi ? 'left' : 'right';
      goToPage(firstPage, dir);
    });
    container.appendChild(item);
  });
}

function openOverlay() {
  buildDreamList();
  document.getElementById('dream-list-overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('dream-list-overlay').classList.remove('open');
}

// ─────────────────────────────────────────────────────
// TOUCH SWIPE
// ─────────────────────────────────────────────────────
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) goNext();
    else goPrev();
  }
}, { passive: true });

// ─────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (document.getElementById('dream-list-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeOverlay();
    return;
  }
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft')  goPrev();
});

// ─────────────────────────────────────────────────────
// EVENT WIRING
// ─────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', goNext);
document.getElementById('dream-label').addEventListener('click', openOverlay);
document.getElementById('btn-overlay-close').addEventListener('click', closeOverlay);
document.getElementById('dream-list-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('dream-list-overlay')) closeOverlay();
});

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Check URL hash for deep link
  const hash = location.hash;
  if (hash && hash.startsWith('#dream-')) {
    const id = hash.replace('#dream-', '');
    const di = DREAMS.findIndex(d => d.id === id);
    if (di !== -1) {
      currentPage = PAGES.findIndex(p => p.type === 'panel' && p.dreamIdx === di);
    }
  }
  fullRender();
});
</script>
</body>
