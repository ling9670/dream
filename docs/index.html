<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夢裡夢外 — Among All Dreams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --text: #2C2A27;
    --text-muted: #7A7670;
    --border: #DDD9D0;
    --card-bg: #FDFAF5;

    --phase-departure:  #C4B49A;
    --phase-loss:       #8B9EA8;
    --phase-violence:   #A8896C;
    --phase-heartdead:  #6B7280;
    --phase-rebuild:    #7A9E87;
    --phase-action:     #9B7B9E;
    --phase-fly:        #B8A9C9;
    --phase-float:      #A9C4C0;

    --max-w: 640px;
    --font-serif: 'Noto Serif TC', 'Songti SC', serif;
    --font-mono: 'Courier New', Courier, monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.75;
    min-height: 100vh;
  }

  /* ── Layout shell ──────────────────────────────────────── */
  #app {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ── Site header ───────────────────────────────────────── */
  .site-header {
    padding: 48px 0 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .site-header h1 {
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    line-height: 1.3;
  }
  .site-header .subtitle {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Dream grid ────────────────────────────────────────── */
  #list-view {
    display: block;
  }
  #list-view.hidden { display: none; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding-bottom: 64px;
  }

  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }

  .dream-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 14px 14px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .dream-card::before {
    content: '';
    display: block;
    width: 3px;
    position: absolute;
    top: 0; left: 0; bottom: 0;
    border-radius: 6px 0 0 6px;
  }
  .dream-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .dream-card:active { transform: translateY(0); }

  .card-number {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }
  .card-phase {
    margin-top: 10px;
    display: inline-block;
    font-size: 0.65rem;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 20px;
    color: #fff;
    opacity: 0.9;
  }

  /* ── Story view ─────────────────────────────────────────── */
  #story-view { display: none; }
  #story-view.active { display: block; }

  .story-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 28px;
    gap: 8px;
  }
  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .nav-btn:hover {
    background: var(--border);
    color: var(--text);
  }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }
  .nav-btn.back {
    font-size: 0.75rem;
    padding: 6px 14px;
  }

  .story-header {
    text-align: center;
    padding: 0 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .story-number {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .story-title {
    font-size: 1.4rem;
    font-weight: 600;
    line-height: 1.35;
  }
  .story-phase-pill {
    margin-top: 14px;
    display: inline-block;
    font-size: 0.7rem;
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    padding: 4px 14px;
    border-radius: 20px;
    color: #fff;
  }

  /* ── Panels ─────────────────────────────────────────────── */
  .panels-list { list-style: none; }
  .panel-item {
    margin-bottom: 48px;
  }

  /* placeholder image — 9:16 aspect ratio */
  .panel-image {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #E8E4DC;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .panel-image-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    color: #B0ABA2;
    text-transform: uppercase;
    user-select: none;
  }

  .panel-text {
    font-size: 0.95rem;
    line-height: 1.9;
    color: var(--text);
  }

  /* ── Analysis section ───────────────────────────────────── */
  .analysis-section {
    margin-top: 56px;
    padding: 28px 22px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 72px;
  }
  .analysis-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .analysis-text {
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--text);
  }

  /* ── Phase color helpers ────────────────────────────────── */
  .phase-departure  { background-color: var(--phase-departure); }
  .phase-loss       { background-color: var(--phase-loss); }
  .phase-violence   { background-color: var(--phase-violence); }
  .phase-heartdead  { background-color: var(--phase-heartdead); }
  .phase-rebuild    { background-color: var(--phase-rebuild); }
  .phase-action     { background-color: var(--phase-action); }
  .phase-fly        { background-color: var(--phase-fly); }
  .phase-float      { background-color: var(--phase-float); }

  .border-departure  { border-left-color: var(--phase-departure) !important; }
  .border-loss       { border-left-color: var(--phase-loss) !important; }
  .border-violence   { border-left-color: var(--phase-violence) !important; }
  .border-heartdead  { border-left-color: var(--phase-heartdead) !important; }
  .border-rebuild    { border-left-color: var(--phase-rebuild) !important; }
  .border-action     { border-left-color: var(--phase-action) !important; }
  .border-fly        { border-left-color: var(--phase-fly) !important; }
  .border-float      { border-left-color: var(--phase-float) !important; }

  .color-bar-departure  { background: var(--phase-departure); }
  .color-bar-loss       { background: var(--phase-loss); }
  .color-bar-violence   { background: var(--phase-violence); }
  .color-bar-heartdead  { background: var(--phase-heartdead); }
  .color-bar-rebuild    { background: var(--phase-rebuild); }
  .color-bar-action     { background: var(--phase-action); }
  .color-bar-fly        { background: var(--phase-fly); }
  .color-bar-float      { background: var(--phase-float); }

  /* card color bar (::before pseudo-element) */
  .dream-card.phase-departure::before  { background: var(--phase-departure); }
  .dream-card.phase-loss::before       { background: var(--phase-loss); }
  .dream-card.phase-violence::before   { background: var(--phase-violence); }
  .dream-card.phase-heartdead::before  { background: var(--phase-heartdead); }
  .dream-card.phase-rebuild::before    { background: var(--phase-rebuild); }
  .dream-card.phase-action::before     { background: var(--phase-action); }
  .dream-card.phase-fly::before        { background: var(--phase-fly); }
  .dream-card.phase-float::before      { background: var(--phase-float); }

  /* footer */
  .site-footer {
    text-align: center;
    padding: 24px 0 40px;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div id="app">

  <header class="site-header">
    <h1>夢裡夢外</h1>
    <p class="subtitle">Among All Dreams &mdash; Eve &middot; 2026</p>
  </header>

  <!-- LIST VIEW -->
  <section id="list-view">
    <div class="grid" id="dream-grid">
      <!-- cards injected by JS -->
    </div>
  </section>

  <!-- STORY VIEW -->
  <section id="story-view">
    <nav class="story-nav">
      <button class="nav-btn back" id="btn-back">← 所有夢</button>
      <div style="display:flex;gap:8px;">
        <button class="nav-btn" id="btn-prev">‹ 上一個</button>
        <button class="nav-btn" id="btn-next">下一個 ›</button>
      </div>
    </nav>
    <div id="story-content">
      <!-- injected by JS -->
    </div>
  </section>

  <footer class="site-footer">
    &copy; 2026 Eve &mdash; 夢裡夢外 Among All Dreams
  </footer>
</div>

<script>
// ─────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────

const PHASES = {
  '出發':     'departure',
  '失去':     'loss',
  '暴力與覺察': 'violence',
  '心死':     'heartdead',
  '重建':     'rebuild',
  '行動的呼喚': 'action',
  '飛起':     'fly',
  '浮起':     'float',
};

// Each dream: id, title, phase, panels (array of strings), analysis (string)
const DREAMS = [
  {
    id: '01',
    title: '中式大宅中轉站',
    phase: '出發',
    panels: [
      '我住在那棟宅子的時間比所有人都長。',
      '門廊、走廊、每一個轉角，我都認識。朋友們住在不同的樓層和房間，偶爾遇上，我只問一件事：「你什麼時候要走？」他們都會走，乘飛機去不同的地方。我也會走，只是不知道是哪一天。',
      '每次擁抱都用力。因為下一站各散東西，不知道還會不會再見。',
      '有一天，兩個人來找住在宅子裡的某個人。我幫他們尋找，走錯了方向，推開了幾扇不認識的門。裡面的房間很奇怪——由網格組成，橫向伸展，像懸在半空的陽台，四面全是格子，只容得下一個人。走進去，腳下的格子透著空，下面什麼都沒有。不穩，不安，像站在空氣上。',

      '後來我把網格房的事告訴別人。她們都說：「沒有這樣的房間。」',
    ],
    analysis: '做夢者站在人生的過渡點，比其他人更遲啟程，更深地感受每一次離別。她發現了一個只有她看見、沒有人承認的秘密空間，然後仍然繼續找人、繼續擁抱，繼續待在那棟她比誰都長的宅子裡。她所感受的孤獨，是「我看見的東西無人共見」的那種。',
  },
  {
    id: '02',
    title: '後樓梯殘缺樂器追逐',
    phase: '出發',
    panels: [
      '整個世界是灰色的。',
      '後樓梯比正常的更窄，梯級扁平，可以一跳越過半層。我和男朋友非常緊張地往下走。下面有出口，我們只想快點出去。',
      '某一層，一個女生靠在牆邊。她扶著破掉一半的樂器，好像要演奏，又好像要介紹。她的手腕不在身上，落在地板上。',

      '出到街道，直接上了車。我坐定，回頭望著門口等，看她有沒有跟出來。',
      '走出來的是一位普通的婦人。那個女生不見了。',

    analysis: '做夢者正在用一條後樓梯，在一個沒有顏色的世界裡，快速離開某個她不願意面對的內在存在。那個存在不危險，它只是殘缺，只是渴望被看見，只是跟著做夢者，上了她的車，坐在後座等她。',

      '我答應了他。他可以在車房裡過一夜。',

      '然後我沉下去，很深的地方，深呼了一口氣，說：「醒。」',

  {

      '穿越商場，裡面有活動，人很多，我在人群裡穿梭離開。',
      '麵包店裡找到媽媽。我和她很不熟悉，感到疏離，但我知道：只要我在她旁邊，就永遠有個位置，她會接納我。',
      '她一直問我她要買哪個餅乾送人，我說不知道，只是告訴她：「你買你認為適合的，我只想觀察你的選擇。」',
      '黃昏，麵包店，我在媽媽旁邊，就記得到這裡。',
    ],
    analysis: '做夢者逃離了突然有力量的人，找到了永遠接納她的人，在黃昏的麵包店站在旁邊看媽媽選餅乾。這個結尾的平靜，說的是：做夢者知道她的底線在哪裡，她知道怎麼找到它。',
  },
  {
    id: '53',
    title: '鐵達尼號泥漿浮木求生',
    phase: '浮起',
    panels: [
      '水不是水，是泥漿。',
      '和鐵達尼號沉沒的感覺一樣，只是每一個沉進去的地方都是泥漿，不透明，沉重，包裹著一切。船身一個部分一個部分地沉入，泥漿從那些缺口湧進來。我從一個部分躲到下一個，再下一個，繼續移動。',
      '最後那個部分沉了，沒有地方可以再躲，泥漿湧進來，我也沉進去了。',
      '泥漿裡有一扇木門，漂著。我找到它，爬上去。',
      '沒有猶豫。',
    ],
    analysis: '沉重的環境（泥漿），有序的迴避，最後沉入，然後找到門，爬上去，沒有猶豫。夢在這裡結束。做夢者在那扇木門上，浮著。',
  },
];

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────

let currentDreamIndex = null;

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────

function phaseClass(phase) {
  return 'phase-' + (PHASES[phase] || 'departure');
}

function phaseLabel(phase) {
  return phase;
}

// ─────────────────────────────────────────────────────────
// RENDER: LIST
// ─────────────────────────────────────────────────────────

function renderList() {
  const grid = document.getElementById('dream-grid');
  grid.innerHTML = '';
  DREAMS.forEach((dream, idx) => {
    const card = document.createElement('div');
    card.className = 'dream-card ' + phaseClass(dream.phase);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', '夢 ' + dream.id + ' ' + dream.title);
    card.innerHTML =
      '<div class="card-number">DREAM #' + dream.id + '</div>' +
      '<div class="card-title">' + escHtml(dream.title) + '</div>' +
      '<span class="card-phase ' + phaseClass(dream.phase) + '">' + escHtml(dream.phase) + '</span>';
    card.addEventListener('click', () => openDream(idx));
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') openDream(idx);
    });
    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────────────────────
// RENDER: STORY
// ─────────────────────────────────────────────────────────

function renderStory(idx) {
  const dream = DREAMS[idx];
  const content = document.getElementById('story-content');

  const panelsHtml = dream.panels.map((text, i) =>
    '<li class="panel-item">' +
    /* TODO: replace with actual MJ image */
    '<div class="panel-image" aria-label="Panel ' + (i + 1) + '">' +
    '<span class="panel-image-label">P' + (i + 1) + '</span>' +
    '</div>' +
    '<p class="panel-text">' + escHtml(text) + '</p>' +
    '</li>'
  ).join('');

  content.innerHTML =
    '<div class="story-header">' +
      '<div class="story-number">DREAM #' + dream.id + '</div>' +
      '<h2 class="story-title">' + escHtml(dream.title) + '</h2>' +
      '<span class="story-phase-pill ' + phaseClass(dream.phase) + '">' + escHtml(dream.phase) + '</span>' +
    '</div>' +
    '<ul class="panels-list">' + panelsHtml + '</ul>' +
    '<div class="analysis-section">' +
      '<div class="analysis-label">分析</div>' +
      '<p class="analysis-text">' + escHtml(dream.analysis) + '</p>' +
    '</div>';

  // update nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === DREAMS.length - 1;
}

// ─────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────

function openDream(idx) {
  currentDreamIndex = idx;
  document.getElementById('list-view').classList.add('hidden');
  const sv = document.getElementById('story-view');
  sv.classList.add('active');
  renderStory(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // update URL hash for linkability
  history.pushState({ dreamIdx: idx }, '', '#dream-' + DREAMS[idx].id);
}

function backToList() {
  currentDreamIndex = null;
  document.getElementById('story-view').classList.remove('active');
  document.getElementById('list-view').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState({}, '', location.pathname);
}

// ─────────────────────────────────────────────────────────
// UTIL
// ─────────────────────────────────────────────────────────

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  renderList();

  document.getElementById('btn-back').addEventListener('click', backToList);

  document.getElementById('btn-prev').addEventListener('click', () => {
    if (currentDreamIndex > 0) openDream(currentDreamIndex - 1);
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    if (currentDreamIndex < DREAMS.length - 1) openDream(currentDreamIndex + 1);
  });

  // handle browser back/forward
  window.addEventListener('popstate', (e) => {
    if (e.state && typeof e.state.dreamIdx === 'number') {
      currentDreamIndex = e.state.dreamIdx;
      document.getElementById('list-view').classList.add('hidden');
      document.getElementById('story-view').classList.add('active');
      renderStory(currentDreamIndex);
    } else {
      backToList();
    }
  });

  // deep link on load
  const hash = location.hash;
  if (hash && hash.startsWith('#dream-')) {
    const id = hash.replace('#dream-', '');
    const idx = DREAMS.findIndex(d => d.id === id);
    if (idx !== -1) openDream(idx);
  }
});
</script>
