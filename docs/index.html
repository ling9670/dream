<html lang="zh-TW">

<meta property="og:title" content="夢裡夢外 — Among All Dreams">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#F2ECE0; --paper2:#F6F1E8; --edge:#E7DFD0;
  --ink:#2C2823; --ink2:rgba(44,40,35,.62); --ink3:rgba(44,40,35,.40); --ink4:rgba(44,40,35,.16);
  --gold:#9C8866; --cream:#F6F1E8;
  --zh:'Noto Serif TC',serif; --en:'Cormorant Garamond',serif;
  --safe-t:max(env(safe-area-inset-top),0px);
  --safe-b:max(env(safe-area-inset-bottom),0px);
  --ease:cubic-bezier(.6,.02,.2,1);
}
html,body{height:100%;overflow:hidden;background:#D7CFBF;}
body{
  font-family:var(--zh);color:var(--ink);
  background:
    radial-gradient(130% 90% at 50% -5%, #E4DCCC 0%, #D2C9B7 55%, #C7BDAA 100%);
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

/* ── STAGE ─────────────────────────────────── */
#app{
  position:relative;width:min(100vw,452px);height:100dvh;max-height:980px;
  background:var(--paper);overflow:hidden;
  box-shadow:0 40px 90px -30px rgba(40,34,26,.6), 0 2px 0 rgba(255,255,255,.3) inset;
}
@media(min-width:520px){ #app{border-radius:6px;} }

.view{position:absolute;inset:0;display:none;flex-direction:column;}
.view.active{display:flex;}

img{display:block;}
.kicker{font-family:var(--en);font-style:italic;font-size:.92rem;letter-spacing:.04em;color:var(--ink3);}
.zh-kicker{font-family:var(--zh);font-weight:300;font-size:.52rem;letter-spacing:.42em;color:var(--ink3);text-indent:.42em;}
.hair{height:1px;background:var(--ink4);border:0;}
.tap{cursor:pointer;}

/* ── COVER ─────────────────────────────────── */
#cover{cursor:pointer;}
#cover .bg{position:absolute;inset:0;background-size:cover;background-position:center;}
#cover .vig{position:absolute;inset:0;background:
  radial-gradient(78% 44% at 50% 60%, rgba(26,21,14,.40), transparent 72%),
  linear-gradient(to bottom, rgba(28,23,17,.42) 0%, rgba(28,23,17,.04) 24%, rgba(28,23,17,.10) 56%, rgba(28,23,17,.62) 100%);}
#cover .inner{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:calc(var(--safe-t) + 54px) 30px calc(var(--safe-b) + 40px);color:var(--cream);}
#cover .ck{font-family:var(--en);font-style:italic;font-size:1rem;letter-spacing:.06em;color:rgba(246,241,232,.82);}
#cover .grow{flex:1;}
#cover .rule{width:1px;height:40px;background:rgba(246,241,232,.55);margin-bottom:22px;}
#cover .title{font-family:var(--zh);font-weight:500;font-size:clamp(2.8rem,15vw,3.7rem);letter-spacing:.2em;text-indent:.2em;
  line-height:1.16;text-shadow:0 2px 20px rgba(0,0,0,.45);}
#cover .en{font-family:var(--en);font-size:1.18rem;letter-spacing:.34em;text-indent:.34em;margin-top:16px;color:rgba(246,241,232,.9);text-transform:uppercase;}
#cover .author{font-family:var(--en);font-size:.92rem;letter-spacing:.22em;color:rgba(246,241,232,.86);}
#cover .hint{font-family:var(--zh);font-weight:300;font-size:.64rem;letter-spacing:.34em;color:rgba(246,241,232,.66);margin-top:26px;
  animation:breathe 3.4s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.85}}

/* ── PAPER PAGES (letters / northstar) ─────── */
.paper{background:
  radial-gradient(120% 60% at 50% 0%, #F7F2E9, #F1EADD 70%);
  flex:1;display:flex;flex-direction:column;min-height:0;}
.paper-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(var(--safe-t) + 60px) 44px calc(var(--safe-b) + 30px);
  display:flex;flex-direction:column;}
.paper-scroll::-webkit-scrollbar{width:0;}
.letter-title{font-family:var(--zh);font-weight:500;font-size:1.33rem;letter-spacing:.16em;text-indent:.16em;margin:8px 0 4px;}
.letter-en{font-family:var(--en);font-style:italic;font-size:1.38rem;color:var(--gold);letter-spacing:.02em;}
.ph-tag{display:inline-block;font-family:var(--en);font-style:italic;font-size:.82rem;color:#A98C5E;
  border:1px solid #cdb98f;background:#f4ead6;border-radius:2px;padding:2px 9px;margin:18px 0 14px;letter-spacing:.02em;}
.letter-body{font-family:var(--zh);font-weight:300;font-size:.78rem;line-height:1.55;color:var(--ink);text-wrap:pretty;}
.letter-body p{margin-bottom:.8em;}
.letter-body.ph{color:var(--ink3);font-style:normal;}
.letter-body .en{display:block;font-family:var(--en);font-style:italic;font-size:.96rem;color:var(--ink3);margin-top:.85em;line-height:1.4;}
.sign{font-family:var(--en);font-style:italic;font-size:1.46rem;color:var(--ink2);text-align:right;margin-top:26px;}
.page-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 22px calc(var(--safe-b) + 16px);flex:0 0 auto;}
.pbtn{font-family:var(--zh);font-weight:300;font-size:.74rem;letter-spacing:.18em;color:var(--ink2);
  background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:8px 4px;}
.pbtn .en{font-family:var(--en);font-style:italic;letter-spacing:.02em;font-size:.92rem;color:var(--ink3);}
.pbtn.cta{color:var(--ink);}
.pbtn:hover{color:var(--ink);}

/* ── CONTENTS ──────────────────────────────── */
#contents .top{flex:0 0 auto;display:flex;align-items:center;justify-content:center;position:relative;
  padding:calc(var(--safe-t) + 22px) 20px 14px;}
#contents .top .back{position:absolute;left:16px;bottom:14px;}
#contents .top h2{font-family:var(--zh);font-weight:500;font-size:.82rem;letter-spacing:.3em;text-indent:.3em;}
#contents .top .en{font-family:var(--en);font-style:italic;font-size:.99rem;color:var(--ink3);margin-left:8px;letter-spacing:.02em;}
.toc-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0 calc(var(--safe-b) + 30px);}
.toc-scroll::-webkit-scrollbar{width:0;}
.timeline{position:relative;padding:10px 26px 0 46px;}
.timeline::before{content:"";position:absolute;left:26px;top:18px;bottom:30px;width:1px;background:var(--ink4);}
.phase{position:relative;margin-bottom:26px;}
.phase .pnode{position:absolute;left:-26px;top:5px;width:13px;height:13px;border-radius:50%;
  box-shadow:0 0 0 4px var(--paper);}
.phase .phead{display:flex;align-items:baseline;gap:9px;margin-bottom:10px;}
.phase .pz{font-family:var(--zh);font-weight:500;font-size:.75rem;letter-spacing:.14em;}
.phase .pe{font-family:var(--en);font-style:italic;font-size:.96rem;color:var(--ink3);}
.dream-row{display:flex;align-items:baseline;gap:12px;padding:9px 8px 9px 2px;cursor:pointer;border-radius:4px;
  transition:background .15s;}
.dream-row:hover{background:rgba(44,40,35,.045);}
.dream-row .num{font-family:var(--en);font-size:.90rem;color:var(--ink3);min-width:30px;letter-spacing:.04em;}
.dream-row .tt{flex:1;}
.dream-row .tz{font-family:var(--zh);font-weight:400;font-size:.72rem;line-height:1.5;}
.dream-row .te{font-family:var(--en);font-style:italic;font-size:.90rem;color:var(--ink3);line-height:1.4;}
.dream-row .pc{font-family:var(--en);font-size:.77rem;color:var(--ink3);}

/* ── READER ────────────────────────────────── */
#reader{background:#1a1611;}
.deck{position:absolute;inset:0;overflow:hidden;touch-action:pan-y;}
.track{display:flex;height:100%;will-change:transform;transition:transform .55s var(--ease);}
.slide{position:relative;flex:0 0 100%;height:100%;overflow:hidden;}
.slide.s-img{background:#15110c;}
.slide.s-img .pic{position:absolute;inset:0;background-size:cover;background-position:center;}
.slide.s-img .top-scrim{position:absolute;top:0;left:0;right:0;height:30%;
  background:linear-gradient(to bottom, rgba(20,16,11,.72), transparent);}
.slide.s-img .cap-scrim{position:absolute;left:0;right:0;bottom:0;height:52%;
  background:linear-gradient(to top, rgba(16,12,8,.86) 8%, rgba(16,12,8,.45) 48%, transparent);}
.cap{position:absolute;left:0;right:0;bottom:0;padding:0 36px calc(var(--safe-b) + 70px);}
.cap .zh{font-family:var(--zh);font-weight:300;font-size:.91rem;line-height:1.55;color:#F6F1E8;
  text-shadow:0 1px 14px rgba(0,0,0,.5);text-wrap:pretty;}
.cap .en{font-family:var(--en);font-style:italic;font-size:1.00rem;line-height:1.4;color:rgba(246,241,232,.74);margin-top:9px;text-shadow:0 1px 10px rgba(0,0,0,.5);}

/* analysis slide */
.slide.s-analysis{background:radial-gradient(120% 60% at 50% 0%, #F7F2E9, #EFE7D9 75%);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.slide.s-analysis::-webkit-scrollbar{width:0;}
.an-wrap{padding:calc(var(--safe-t) + 64px) 44px calc(var(--safe-b) + 30px);min-height:100%;display:flex;flex-direction:column;}
.an-dot{width:11px;height:11px;border-radius:50%;margin-bottom:14px;}
.an-phase{font-family:var(--en);font-style:italic;font-size:.96rem;color:var(--ink3);letter-spacing:.02em;}
.an-title{font-family:var(--zh);font-weight:500;font-size:1.11rem;letter-spacing:.08em;margin-top:4px;line-height:1.3;}
.an-title-en{font-family:var(--en);font-style:italic;font-size:1.09rem;color:var(--ink3);margin-top:4px;}
.an-label{font-family:var(--en);font-style:italic;font-size:.90rem;color:#A98C5E;letter-spacing:.08em;margin:18px 0 6px;}
.motif{margin-top:16px;}
.motif h4{font-family:var(--zh);font-weight:600;font-size:.77rem;letter-spacing:.04em;}
.motif h4 .e{font-family:var(--en);font-style:italic;font-weight:400;font-size:.94rem;color:var(--ink3);margin-left:8px;letter-spacing:0;}
.motif p{font-family:var(--zh);font-weight:300;font-size:.70rem;line-height:1.55;color:var(--ink);margin-top:5px;text-wrap:pretty;}
.an-sum{font-family:var(--zh);font-weight:400;font-size:.75rem;line-height:1.55;color:var(--ink);text-wrap:pretty;}
.an-sum .en{display:block;font-family:var(--en);font-style:italic;font-size:.98rem;line-height:1.45;color:var(--ink2);margin-top:1em;}
.an-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:30px;padding-top:18px;border-top:1px solid var(--ink4);}

/* reader chrome */
.r-top{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:calc(var(--safe-t) + 14px) 16px 10px;pointer-events:none;}
.r-top>*{pointer-events:auto;}
.r-menu{font-family:var(--zh);font-weight:300;font-size:.72rem;letter-spacing:.22em;color:#F6F1E8;background:none;border:none;cursor:pointer;
  text-shadow:0 1px 8px rgba(0,0,0,.5);padding:4px;}
#reader.on-analysis .r-menu{color:var(--ink2);text-shadow:none;}
.r-title{flex:1;text-align:center;overflow:hidden;}
.r-title .z{font-family:var(--zh);font-weight:400;font-size:.8rem;letter-spacing:.08em;color:#F6F1E8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 8px rgba(0,0,0,.55);}
.r-title .e{font-family:var(--en);font-style:italic;font-size:.74rem;color:rgba(246,241,232,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 8px rgba(0,0,0,.55);}
#reader.on-analysis .r-title .z{color:var(--ink2);text-shadow:none;}
#reader.on-analysis .r-title .e{color:var(--ink3);text-shadow:none;}
.r-idx{font-family:var(--en);font-size:.82rem;letter-spacing:.06em;color:#F6F1E8;min-width:40px;text-align:right;text-shadow:0 1px 8px rgba(0,0,0,.5);}
#reader.on-analysis .r-idx{color:var(--ink3);text-shadow:none;}

.chev{position:absolute;top:50%;transform:translateY(-50%);z-index:7;width:42px;height:62px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;color:rgba(246,241,232,.0);font-size:2rem;font-family:var(--en);transition:color .2s;}
#reader:hover .chev{color:rgba(246,241,232,.5);}
#reader.on-analysis .chev{color:rgba(44,40,35,.0);}
#reader.on-analysis:hover .chev{color:rgba(44,40,35,.35);}
.chev.prev{left:0;}.chev.next{right:0;}
.chev:disabled{opacity:0;pointer-events:none;}

.dots{position:absolute;left:0;right:0;bottom:calc(var(--safe-b) + 26px);z-index:8;display:flex;gap:6px;justify-content:center;align-items:center;pointer-events:none;}
.dots .d{width:5px;height:5px;border-radius:50%;background:rgba(246,241,232,.4);transition:.3s;}
.dots .d.on{background:#F6F1E8;width:16px;border-radius:3px;}
.dots .d.an{width:7px;height:7px;background:none;border:1px solid rgba(246,241,232,.5);transform:rotate(45deg);border-radius:1px;}
.dots .d.an.on{background:#F6F1E8;border-color:#F6F1E8;}
#reader.on-analysis .dots{display:none;}

.mini{font-family:var(--zh);font-weight:300;font-size:.72rem;letter-spacing:.16em;color:var(--ink2);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;}
.mini .en{font-family:var(--en);font-style:italic;letter-spacing:.02em;font-size:.9rem;color:var(--ink3);}
.mini:hover{color:var(--ink);}
.mini:disabled{opacity:.3;pointer-events:none;}

/* northstar */
#northstar .paper-scroll{align-items:center;text-align:center;justify-content:center;}
#northstar .ns-title{font-family:var(--zh);font-weight:500;font-size:.86rem;letter-spacing:.32em;text-indent:.32em;}
#northstar .ns-en{font-family:var(--en);font-style:italic;font-size:1.04rem;color:var(--ink3);margin-top:6px;}
#northstar .ns-body{font-family:var(--zh);font-weight:300;font-size:.92rem;line-height:1.6;max-width:320px;margin:34px 0;text-wrap:pretty;}
#northstar .ns-en2{font-family:var(--en);font-style:italic;font-size:1.04rem;line-height:1.45;color:var(--ink2);max-width:320px;}
#northstar .ns-body p{margin-bottom:.85em;}
.ornament{color:var(--gold);font-size:1rem;letter-spacing:.5em;text-indent:.5em;margin:6px 0;}

/* ── AI PAGE ───────────────────────────────── */
#letterAI .ai-emblem{font-family:var(--en);color:var(--gold);font-size:1.05rem;letter-spacing:.6em;text-indent:.6em;margin:14px 0 12px;}
#letterAI .ai-title{font-size:1.04rem;line-height:1.5;letter-spacing:.04em;text-indent:0;margin:8px 0 4px;}
.ai-sign{margin-top:32px;padding-top:18px;border-top:1px solid var(--ink4);display:flex;flex-direction:column;gap:4px;text-align:right;}
.ai-sign-em{font-family:var(--zh);font-weight:400;font-size:.79rem;letter-spacing:.04em;color:var(--ink2);}
.ai-sign-en{font-family:var(--en);font-style:italic;font-size:.94rem;letter-spacing:.02em;color:var(--ink3);}
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#C7BDAA"/>
  <circle cx="50" cy="46" r="20" fill="none" stroke="#F6F1E8" stroke-width="2.2"/>
  <circle cx="58" cy="40" r="18" fill="#C7BDAA"/>
  <path d="M50 74 q-2 -8 -6 -10 q8 -2 10 -8 q2 6 10 8 q-12 2 -14 10z" fill="#9C8866"/>
</svg>
</template>
<div id="app">

  <!-- COVER -->
  <section id="cover" class="view active" onclick="App.enter('letterDreamer')">
    <div class="bg" id="cover-bg"></div>
    <div class="vig"></div>
    <div class="inner">
      <div class="ck">a picture book of dreams</div>
      <div class="grow"></div>
      <div class="rule"></div>
      <div class="title">夢裡夢外</div>
      <div class="en">Among All Dreams</div>
      <div class="grow"></div>
      <div class="author">good_.evelyn &nbsp;·&nbsp; 2025–2026</div>
      <div class="hint">輕觸翻開 · tap to begin</div>
    </div>
  </section>

  <!-- LETTER — DREAMER -->
  <section id="letterDreamer" class="view"><div class="paper">
    <div class="paper-scroll" id="ld-body"></div>
    <div class="page-nav">
      <button class="pbtn" onclick="App.enter('cover')">‹ <span class="en">cover</span></button>
      <button class="pbtn cta" onclick="App.enter('contents')">目錄 <span class="en">contents ›</span></button>
    </div>
  </div></section>

  <!-- CONTENTS -->
  <section id="contents" class="view">
    <div class="top">
      <button class="pbtn back" onclick="App.enter('cover')">‹ <span class="en">cover</span></button>
      <h2>目錄<span class="en">contents</span></h2>

    <div class="r-top">
      <button class="r-menu" onclick="App.enter('contents')">目錄</button>
      <div class="r-title"><div class="z" id="rt-z"></div><div class="e" id="rt-e"></div></div>
      <div class="r-idx" id="rt-idx"></div>
    </div>
    <button class="chev prev" id="chev-prev" onclick="App.prev()" aria-label="prev">‹</button>
    <button class="chev next" id="chev-next" onclick="App.next()" aria-label="next">›</button>
    <div class="dots" id="dots"></div>
  </section>

  <!-- LETTER — READER -->
  <section id="letterReader" class="view"><div class="paper">
    <div class="paper-scroll" id="lr-body"></div>
    <div class="page-nav">
      <button class="pbtn" onclick="App.enter('contents')"><span class="en">‹ contents</span> 目錄</button>

  <!-- LETTER — AI -->
  <section id="letterAI" class="view"><div class="paper">
    <div class="paper-scroll" id="lai-body"></div>
    <div class="page-nav">
      <button class="pbtn" onclick="App.enter('letterReader')"><span class="en">‹ reader</span> 給讀者的話</button>
      <button class="pbtn cta" onclick="App.enter('northstar')">為什麼 <span class="en">why ›</span></button>
    </div>
  </div></section>

  <!-- NORTHSTAR -->
  <section id="northstar" class="view"><div class="paper">
    <div class="paper-scroll" id="ns-body"></div>
    <div class="page-nav">
      <button class="pbtn" onclick="App.enter('contents')">‹ <span class="en">contents</span></button>
      <button class="pbtn" onclick="App.enter('cover')">封面 <span class="en">cover ›</span></button>
    </div>
  </div></section>

</div>

<script src="data-dreams.js"></script>
<script src="data-analysis.js"></script>
<script>
const App = (function(){
  const DREAMS=window.DREAMS, PHASES=window.PHASES, ANALYSIS=window.ANALYSIS, LETTERS=window.LETTERS;
  const phaseMap={}; PHASES.forEach(p=>phaseMap[p.id]=p);
  // keep array order == phase-grouped display order (stable sort preserves order within a phase)
  const phaseOrder={}; PHASES.forEach((p,i)=>phaseOrder[p.id]=i);
  DREAMS.sort((a,b)=>phaseOrder[a.phase]-phaseOrder[b.phase]);
  const $=s=>document.querySelector(s);
  const imgSrc=(id,i)=>`assets/img/dream-${id}/panel-${String(i+1).padStart(2,'0')}.jpg`;

  let view='cover', di=0, si=0;
  const KEY='amad-pos';

  function save(){ try{localStorage.setItem(KEY,JSON.stringify({view,di,si}));}catch(e){} }
  function load(){ try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;} }

  function showView(v){
    document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
    $('#'+v).classList.add('active'); view=v; save();
  }

  function enter(v){
    if(v==='cover'){ showView('cover'); return; }
    if(v==='letterDreamer'){ renderLetter('ld-body',LETTERS.dreamer); showView('letterDreamer'); return; }
    if(v==='contents'){ showView('contents'); return; }
    if(v==='letterReader'){ renderLetter('lr-body',LETTERS.reader); showView('letterReader'); return; }
    if(v==='letterAI'){ renderAILetter(); showView('letterAI'); return; }
    if(v==='northstar'){ renderNorthstar(); showView('northstar'); return; }
    if(v==='reader'){ showView('reader'); return; }
  }

  /* ---- letters ---- */
  function paras(txt){ return txt.split('\n\n').map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join(''); }
  function enParas(txt){ return txt.split('\n\n').map(p=>'<span class="en">'+p.replace(/\n/g,'<br>')+'</span>').join(''); }
  function renderLetter(elId,L){
    $('#'+elId).innerHTML =
      `<div class="zh-kicker">${L.kicker_zh}</div>
       <div class="letter-title">${L.title_zh}</div>
       <div class="letter-en">${L.title_en}</div>
       ${L.placeholder?'<div class="ph-tag">your text here</div>':'<div style="height:18px"></div>'}
       <div class="letter-body ${L.placeholder?'ph':''}">${paras(L.body_zh)}${enParas(L.body_en)}</div>
       <div class="sign">— ${L.sign}</div>`;
  }
  function renderAILetter(){
    const L=LETTERS.ai;
    $('#lai-body').innerHTML =
      `<div class="zh-kicker">${L.kicker_zh}</div>
       <div class="ai-emblem">✦</div>
       <div class="letter-title ai-title">${L.title_zh}</div>
       <div class="letter-en">${L.title_en}</div>
       <div style="height:18px"></div>
       <div class="letter-body">${paras(L.body_zh)}${enParas(L.body_en)}</div>
       <div class="ai-sign"><span class="ai-sign-em">— ${L.sign_zh}</span><span class="ai-sign-en">${L.sign_en}</span></div>`;
  }
  function renderNorthstar(){
    const N=LETTERS.northstar;
    $('#ns-body').innerHTML =
      `<div class="ornament">✦</div>
       <div class="ns-en" style="font-style:italic">${N.kicker_en}</div>
       <div class="ns-title">${N.title_zh}</div>
       <div class="ns-en">${N.title_en}</div>
       <div class="ns-body">${paras(N.body_zh)}</div>
       <div class="ns-en2">${N.body_en}</div>
       <div class="ornament" style="margin-top:30px">✦</div>`;
  }

  /* ---- contents ---- */
  function buildTOC(){
    const el=$('#toc'); let html='';
    PHASES.forEach(ph=>{
      const ds=DREAMS.filter(d=>d.phase===ph.id);
      if(!ds.length) return;
      html+=`<div class="phase"><span class="pnode" style="background:${ph.tone}"></span>
        <div class="phead"><span class="pz">${ph.zh}</span><span class="pe">${ph.en}</span></div>`;
      ds.forEach(d=>{
        const gi=DREAMS.indexOf(d);
        html+=`<div class="dream-row" data-di="${gi}">
          <span class="num">${String(gi+1).padStart(2,'0')}</span>
          <span class="tt"><span class="tz">${d.titleZh}</span><br><span class="te">${d.titleEn}</span></span></div>`;
      });
      html+='</div>';
    });
    el.innerHTML=html;
    el.querySelectorAll('.dream-row').forEach(r=>r.addEventListener('click',()=>openDream(+r.dataset.di,0)));
  }

  /* ---- reader deck ---- */
  let curDream=null, slideCount=0;
  function openDream(idx,slide){
    di=idx; si=slide||0; curDream=DREAMS[di];
    buildDeck(curDream);
    showView('reader');
    goTo(si,false);
  }
  function buildDeck(d){
    const track=$('#track'); const ph=phaseMap[d.phase];
    let html='';
    d.panels.forEach((p,i)=>{
      const cap = p.zh ? `<div class="cap"><div class="zh">${p.zh}</div>${p.en?`<div class="en">${p.en}</div>`:''}</div>` : '';
      html+=`<div class="slide s-img"><div class="pic" style="background-image:url('${imgSrc(d.id,i)}')"></div>
        <div class="top-scrim"></div>${p.zh?'<div class="cap-scrim"></div>':''}${cap}</div>`;
    });
    // analysis slide
    const A=ANALYSIS[d.id]||{motifs:[],sumZh:'',sumEn:''};
    let motifs=A.motifs.map(m=>`<div class="motif"><h4>${m.hZh}<span class="e">${m.hEn}</span></h4><p>${m.zh}</p></div>`).join('');
    const lastDream = di===DREAMS.length-1;
    html+=`<div class="slide s-analysis"><div class="an-wrap">
        <span class="an-dot" style="background:${ph.tone}"></span>
        <div class="an-phase">${ph.zh} · ${ph.en}</div>
        <div class="an-title">${d.titleZh}</div>
        <div class="an-title-en">${d.titleEn}</div>
        <div class="an-sum" style="margin-top:18px">${A.sumZh}<span class="en">${A.sumEn}</span></div>
        <hr class="hair" style="margin:22px 0 18px">
        ${motifs}
        <div class="an-foot">
          <button class="mini" onclick="App.prevDream()" ${di===0?'disabled':''}><span class="en">‹</span> 上一夢</button>
          ${ lastDream
              ? '<button class="mini" onclick="App.enter(\'letterReader\')">給讀者的話 <span class="en">›</span></button>'
              : '<button class="mini" onclick="App.nextDream()">下一夢 <span class="en">›</span></button>' }
        </div>
        <div style="flex:1"></div>
      </div></div>`;
    track.innerHTML=html;
    slideCount=d.panels.length+1;
    buildDots(d);
  }
  function buildDots(d){
    const el=$('#dots'); let h='';
    for(let i=0;i<d.panels.length;i++) h+=`<span class="d" data-i="${i}"></span>`;
    h+=`<span class="d an" data-i="${d.panels.length}"></span>`;
    el.innerHTML=h;
  }
  function goTo(idx,animate){
    si=Math.max(0,Math.min(slideCount-1,idx));
    const track=$('#track');
    track.style.transition = animate===false ? 'none' : '';
    track.style.transform=`translateX(${-si*100}%)`;
    if(animate===false){ track.offsetHeight; track.style.transition=''; }
    updateChrome();
    save();
  }
  function updateChrome(){
    const d=curDream, ph=phaseMap[d.phase];
    const onAnalysis = si===d.panels.length;
    $('#reader').classList.toggle('on-analysis', onAnalysis);
    $('#rt-z').textContent='夢 '+String(di+1).padStart(2,'0')+' · '+d.titleZh;
    $('#rt-e').textContent=d.titleEn;
    $('#rt-idx').textContent = onAnalysis ? '' : (si+1)+' / '+d.panels.length;
    // reset analysis scroll
    if(onAnalysis){ const a=$('#track').children[si]; if(a) a.scrollTop=0; }
    $('#dots').querySelectorAll('.d').forEach((dot,i)=>dot.classList.toggle('on',i===si));
    $('#chev-prev').disabled = (di===0 && si===0);
    $('#chev-next').disabled = (di===DREAMS.length-1 && si===slideCount-1);
  }
  function next(){
    if(si<slideCount-1){ goTo(si+1,true); }
    else { // past analysis → next dream or reader letter
      if(di<DREAMS.length-1) openDream(di+1,0);
      else enter('letterReader');
    }
  }
  function prev(){
    if(si>0){ goTo(si-1,true); }
    else { // before first panel → previous dream's analysis
      if(di>0){ openDream(di-1, DREAMS[di-1].panels.length); }
      else enter('letterDreamer');
    }
  }
  function nextDream(){ if(di<DREAMS.length-1) openDream(di+1,0); }
  function prevDream(){ if(di>0) openDream(di-1,0); }

  /* ---- book-level flow (cover → letter → contents → reader → letter → why) ---- */
  function bookNext(){
    if(view==='cover') enter('letterDreamer');
    else if(view==='letterDreamer') enter('contents');
    else if(view==='contents') openDream(0,0);
    else if(view==='letterReader') enter('letterAI');
    else if(view==='letterAI') enter('northstar');
  }
  function bookPrev(){
    if(view==='letterDreamer') enter('cover');
    else if(view==='contents') enter('letterDreamer');
    else if(view==='letterReader'){ const L=DREAMS.length-1; openDream(L, DREAMS[L].panels.length); }
    else if(view==='letterAI') enter('letterReader');
    else if(view==='northstar') enter('letterAI');
  }

  /* ---- swipe (whole stage) ---- */
  function initSwipe(){
    const stage=$('#app'); let x0=0,y0=0,active=false;
    stage.addEventListener('pointerdown',e=>{ x0=e.clientX;y0=e.clientY;active=true; },{passive:true});
    stage.addEventListener('pointerup',e=>{
      if(!active) return; active=false;
      const dx=e.clientX-x0, dy=e.clientY-y0;
      if(Math.abs(dx)>44 && Math.abs(dx)>Math.abs(dy)*1.3){
        if(view==='reader'){ dx<0?next():prev(); }
        else { dx<0?bookNext():bookPrev(); }
      }
    },{passive:true});
    stage.addEventListener('pointercancel',()=>active=false);
  }

  function initKeys(){
    document.addEventListener('keydown',e=>{
      if(view==='reader'){
        if(e.key==='ArrowRight') next();
        else if(e.key==='ArrowLeft') prev();
        else if(e.key==='Escape') enter('contents');
      } else {
        if(e.key==='ArrowRight') bookNext();
        else if(e.key==='ArrowLeft') bookPrev();
        else if((view==='cover') && (e.key==='Enter'||e.key===' ')){ enter('letterDreamer'); }
      }
    });
  }

  function start(){
    $('#cover-bg').style.backgroundImage=`url('${window.COVER_IMG}')`;
    buildTOC(); initSwipe(); initKeys();
    const pos=load();
    if(pos && pos.view){
      if(pos.view==='reader' && DREAMS[pos.di]){ openDream(pos.di,pos.si||0); }
      else enter(pos.view==='reader'?'contents':pos.view);
    }
  }
  document.addEventListener('DOMContentLoaded',start);

  return { enter, next, prev, nextDream, prevDream, openDream };
})();
</script>
</body>
</html>
